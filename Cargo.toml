[package]
name = "kiss_chat"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.103"
chacha20poly1305 = "0.11.0"
crossterm = { version = "0.29.0", features = ["event-stream"] }
hkdf = "0.13.0"
iroh = "1.0.1"
ml-kem = { version = "0.3.2", features = ["getrandom", "zeroize"] }
rand = "0.10.1"
ratatui = "0.30.2"
sha2 = "0.11.0"
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "sync", "io-util", "net", "rt"] }
x25519-dalek = { version = "2.0.1", features = ["static_secrets"] }
